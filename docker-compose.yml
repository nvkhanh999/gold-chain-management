services:
  db:
    image: postgres:16
    container_name: gold_postgres
    restart: always
    environment:
      POSTGRES_DB: gold_store_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - gold_pg_data:/var/lib/postgresql/data
      - ./database/gold_store_management.sql:/docker-entrypoint-initdb.d/01_gold_store_management.sql:ro

  backend:
    image: python:3.11-slim
    container_name: gold_fastapi
    working_dir: /app/backend
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_HOSTNAME: db
      DATABASE_PORT: 5432
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: gold_store_db
      DATABASE_USERNAME: postgres
      SECRET_KEY: change-this-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    depends_on:
      - db
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  gold_pg_data:
